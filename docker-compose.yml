services:
  evolution-api:
    container_name: carrizo_evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-carrizo-evolution-dev}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      DEL_INSTANCE: "false"
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: carrizo_evolution_pg
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data

  redis:
    container_name: carrizo_evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - evolution_redis:/data

volumes:
  evolution_pg:
  evolution_redis:
